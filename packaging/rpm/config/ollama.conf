# Air-gapped opencode — edit to point at your LAN Ollama, then run:
#   sudo opencode-update-config
OLLAMA_HOST=127.0.0.1
OLLAMA_PORT=11434
MODEL_ID=qwen2.5-coder:7b
# NOTE: opencode is configured for a 64k context (limit.context=65536 in 00-base.json).
# This only works if the OLLAMA SERVER is also set to that context length, e.g. start it
# with OLLAMA_CONTEXT_LENGTH=65536 (or a Modelfile PARAMETER num_ctx 65536). Ollama's
# default is only 4096 — without raising it server-side, the model is silently capped at 4k.
# Mind RAM/VRAM: a 64k KV-cache is large. Keep this value and limit.context in sync.
